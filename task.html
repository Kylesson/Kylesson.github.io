<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Task Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .selected { background-color: #e0e7ff; border-color: #6366f1; }
        .correct { background-color: #d1fae5; border-color: #10b981; }
        .incorrect { background-color: #fee2e2; border-color: #ef4444; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen font-sans">

    <!-- Header -->
    <header class="bg-white border-b border-slate-200 p-4 shadow-sm">
        <div class="max-w-6xl mx-auto flex items-center justify-between">
            <h1 class="text-2xl font-bold text-indigo-600">🧠 AI Task Generator</h1>
            <span class="text-sm text-slate-500">Mock Demo</span>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 md:p-8 grid grid-cols-1 lg:grid-cols-2 gap-8">
        
        <!-- LEFT COLUMN: Input -->
        <section class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 h-fit">
            <h2 class="text-xl font-semibold mb-4 flex items-center gap-2">📥 1. Upload Material</h2>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Text Material</label>
                    <textarea id="textInput" rows="4" class="w-full p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition" placeholder="Paste a paragraph, story, or article here..."></textarea>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Audio File</label>
                        <input type="file" accept="audio/*" class="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100"/>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Screenshot/Image</label>
                        <input type="file" accept="image/*" class="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100"/>
                    </div>
                </div>

                <button id="generateBtn" class="w-full bg-indigo-600 text-white font-semibold py-3 px-4 rounded-lg hover:bg-indigo-700 transition shadow-md flex items-center justify-center gap-2">
                    <span>✨ Generate Tasks</span>
                </button>
            </div>
        </section>

        <!-- RIGHT COLUMN: Output -->
        <section id="outputSection" class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 min-h-[400px] flex flex-col">
            <h2 class="text-xl font-semibold mb-4 flex items-center gap-2">📝 2. Interactive Tasks</h2>
            
            <div id="tasksContainer" class="flex-1 space-y-6">
                <!-- Empty State -->
                <div id="emptyState" class="flex-1 flex flex-col items-center justify-center text-slate-400 py-12">
                    <svg class="w-16 h-16 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    <p class="text-lg font-medium">No tasks generated yet.</p>
                    <p class="text-sm">Upload material and click "Generate Tasks" to begin.</p>
                </div>
            </div>
        </section>
    </main>

    <script>
        // Mock Data representing what the AI would return
        const mockTasks = {
            unscrambleWord: { scrambled: ["L", "P", "A", "N", "E", "T"], answer: "PLANET" },
            unscrambleSentence: { words: ["the", "Earth", "around", "Sun", "orbits", "."], answer: ["Earth", "orbits", "around", "the", "Sun", "."] },
            fillBlanks: { text: "The [planet] closest to the Sun is [Mercury]. It has no [moons].", answers: ["planet", "Mercury", "moons"] },
            wordBank: { text: "The [solar] system has eight [planets].", bank: ["stars", "planets", "solar", "galaxies"], answers: ["solar", "planets"] },
            makeSentence: { prompt: "Write a sentence using the words: gravity, pull, objects." },
            makeQuestions: { prompt: "Write two comprehension questions about the solar system." }
        };

        const generateBtn = document.getElementById('generateBtn');
        const tasksContainer = document.getElementById('tasksContainer');
        const emptyState = document.getElementById('emptyState');

        generateBtn.addEventListener('click', () => {
            // Show loading state
            generateBtn.disabled = true;
            generateBtn.innerHTML = '<span class="animate-pulse">Generating...</span>';
            
            // Simulate API delay
            setTimeout(() => {
                renderTasks(mockTasks);
                generateBtn.disabled = false;
                generateBtn.innerHTML = '<span>✨ Generate Tasks</span>';
            }, 1500);
        });

        function renderTasks(data) {
            if(emptyState) emptyState.remove();
            tasksContainer.innerHTML = '';
            tasksContainer.classList.add('fade-in');

            // 1. Unscramble Word
            tasksContainer.appendChild(createCard("Unscramble the Word", createUnscrambleWord(data.unscrambleWord)));
            // 2. Unscramble Sentence
            tasksContainer.appendChild(createCard("Unscramble the Sentence", createUnscrambleSentence(data.unscrambleSentence)));
            // 3. Fill in the Blanks
            tasksContainer.appendChild(createCard("Fill in the Blanks", createFillBlanks(data.fillBlanks)));
            // 4. Word Bank
            tasksContainer.appendChild(createCard("Fill in the Blanks (Word Bank)", createWordBank(data.wordBank)));
            // 5. Make a Sentence
            tasksContainer.appendChild(createCard("Make a Sentence", createOpenTask(data.makeSentence)));
            // 6. Make Questions
            tasksContainer.appendChild(createCard("Make Questions", createOpenTask(data.makeQuestions)));
        }

        function createCard(title, content) {
            const card = document.createElement('div');
            card.className = "bg-slate-50 border border-slate-200 rounded-lg p-4";
            card.innerHTML = `<h3 class="font-semibold text-indigo-700 mb-3">${title}</h3>`;
            card.appendChild(content);
            return card;
        }

        // --- Task 1: Unscramble Word ---
        function createUnscrambleWord(data) {
            const wrapper = document.createElement('div');
            wrapper.className = "flex flex-col gap-3";
            
            const answerBox = document.createElement('div');
            answerBox.className = "flex gap-2 min-h-[40px] p-2 bg-white border-2 border-dashed border-indigo-300 rounded-lg flex-wrap";
            
            const poolBox = document.createElement('div');
            poolBox.className = "flex gap-2 flex-wrap";
            
            data.scrambled.forEach((letter, i) => {
                const btn = document.createElement('button');
                btn.innerText = letter;
                btn.className = "w-10 h-10 bg-white border border-slate-300 rounded font-bold text-lg hover:bg-indigo-50 transition";
                btn.onclick = () => {
                    if (btn.parentElement === poolBox) {
                        answerBox.appendChild(btn);
                        btn.classList.add('selected');
                    } else {
                        poolBox.appendChild(btn);
                        btn.classList.remove('selected');
                    }
                };
                poolBox.appendChild(btn);
            });

            const checkBtn = document.createElement('button');
            checkBtn.innerText = "Check Answer";
            checkBtn.className = "mt-2 self-start bg-indigo-600 text-white px-4 py-1.5 rounded text-sm hover:bg-indigo-700";
            checkBtn.onclick = () => {
                const currentWord = Array.from(answerBox.children).map(c => c.innerText).join('');
                if (currentWord === data.answer) {
                    answerBox.classList.add('correct');
                    answerBox.classList.remove('incorrect');
                } else {
                    answerBox.classList.add('incorrect');
                    answerBox.classList.remove('correct');
                }
            };

            wrapper.appendChild(answerBox);
            wrapper.appendChild(poolBox);
            wrapper.appendChild(checkBtn);
            return wrapper;
        }

        // --- Task 2: Unscramble Sentence ---
        function createUnscrambleSentence(data) {
            const wrapper = document.createElement('div');
            wrapper.className = "flex flex-col gap-3";
            
            const answerBox = document.createElement('div');
            answerBox.className = "flex gap-2 min-h-[40px] p-2 bg-white border-2 border-dashed border-indigo-300 rounded-lg flex-wrap";
            
            const poolBox = document.createElement('div');
            poolBox.className = "flex gap-2 flex-wrap";
            
            data.words.forEach((word) => {
                const btn = document.createElement('button');
                btn.innerText = word;
                btn.className = "px-3 py-1.5 bg-white border border-slate-300 rounded font-medium hover:bg-indigo-50 transition";
                btn.onclick = () => {
                    if (btn.parentElement === poolBox) {
                        answerBox.appendChild(btn);
                        btn.classList.add('selected');
                    } else {
                        poolBox.appendChild(btn);
                        btn.classList.remove('selected');
                    }
                };
                poolBox.appendChild(btn);
            });

            wrapper.appendChild(answerBox);
            wrapper.appendChild(poolBox);
            return wrapper;
        }

        // --- Task 3: Fill in the Blanks ---
        function createFillBlanks(data) {
            const wrapper = document.createElement('div');
            wrapper.className = "space-y-3";
            
            const textDiv = document.createElement('div');
            textDiv.className = "text-slate-700 leading-relaxed";
            
            let regex = /\[(.*?)\]/g;
            let inputs = [];
            let lastIndex = 0;
            let match;
            
            while ((match = regex.exec(data.text)) !== null) {
                textDiv.appendChild(document.createTextNode(data.text.slice(lastIndex, match.index)));
                const input = document.createElement('input');
                input.type = 'text';
                input.className = "w-24 border-b-2 border-indigo-400 mx-1 px-1 focus:outline-none focus:border-indigo-600";
                textDiv.appendChild(input);
                inputs.push({ el: input, answer: match[1] });
                lastIndex = regex.lastIndex;
            }
            textDiv.appendChild(document.createTextNode(data.text.slice(lastIndex)));
            
            const checkBtn = document.createElement('button');
            checkBtn.innerText = "Check Answers";
            checkBtn.className = "bg-indigo-600 text-white px-4 py-1.5 rounded text-sm hover:bg-indigo-700";
            checkBtn.onclick = () => {
                inputs.forEach(i => {
                    if (i.el.value.toLowerCase() === i.answer.toLowerCase()) {
                        i.el.classList.add('border-green-500', 'bg-green-50');
                    } else {
                        i.el.classList.add('border-red-500', 'bg-red-50');
                    }
                });
            };

            wrapper.appendChild(textDiv);
            wrapper.appendChild(checkBtn);
            return wrapper;
        }

        // --- Task 4: Word Bank ---
        function createWordBank(data) {
            const wrapper = document.createElement('div');
            wrapper.className = "space-y-4";
            
            const textDiv = document.createElement('div');
            textDiv.className = "text-slate-700 leading-relaxed";
            
            let regex = /\[(.*?)\]/g;
            let inputs = [];
            let lastIndex = 0;
            let match;
            
            while ((match = regex.exec(data.text)) !== null) {
                textDiv.appendChild(document.createTextNode(data.text.slice(lastIndex, match.index)));
                const input = document.createElement('input');
                input.type = 'text';
                input.readOnly = true;
                input.className = "w-24 border-b-2 border-indigo-400 mx-1 px-1 cursor-pointer bg-indigo-50";
                input.placeholder = "Click word";
                textDiv.appendChild(input);
                inputs.push(input);
                lastIndex = regex.lastIndex;
            }
            textDiv.appendChild(document.createTextNode(data.text.slice(lastIndex)));

            const bankDiv = document.createElement('div');
            bankDiv.className = "flex gap-2 flex-wrap p-3 bg-slate-100 rounded-lg";
            data.bank.forEach(word => {
                const btn = document.createElement('button');
                btn.innerText = word;
                btn.className = "px-3 py-1 bg-white border border-slate-300 rounded shadow-sm hover:bg-indigo-100 transition";
                btn.onclick = () => {
                    const emptyInput = inputs.find(i => !i.value);
                    if (emptyInput) {
                        emptyInput.value = word;
                        btn.disabled = true;
                        btn.classList.add('opacity-50');
                    }
                };
                bankDiv.appendChild(btn);
            });

            wrapper.appendChild(textDiv);
            wrapper.appendChild(bankDiv);
            return wrapper;
        }

        // --- Task 5 & 6: Open Tasks ---
        function createOpenTask(data) {
            const wrapper = document.createElement('div');
            wrapper.className = "space-y-2";
            
            const prompt = document.createElement('p');
            prompt.className = "text-sm text-slate-600 italic";
            prompt.innerText = data.prompt;
            
            const textarea = document.createElement('textarea');
            textarea.className = "w-full p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none";
            textarea.rows = 3;
            textarea.placeholder = "Type your answer here...";

            const submitBtn = document.createElement('button');
            submitBtn.innerText = "Submit";
            submitBtn.className = "bg-indigo-600 text-white px-4 py-1.5 rounded text-sm hover:bg-indigo-700";
            submitBtn.onclick = () => alert("In the real app, this would be sent to the AI for grading!");

            wrapper.appendChild(prompt);
            wrapper.appendChild(textarea);
            wrapper.appendChild(submitBtn);
            return wrapper;
        }
    </script>
</body>
</html>
